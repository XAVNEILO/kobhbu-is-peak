<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOBHO IS PEAK</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            background-color: #000;
        }
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .background-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }
        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 100%;
        }
        .text-container h1 {
            font-size: 8vw;
            margin: 0;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.9);
            animation: colorChange 3s infinite linear;
        }
        @keyframes colorChange {
            0%   { color: #ff0055; }
            20%  { color: #00ffcc; }
            40%  { color: #ffff00; }
            60%  { color: #ff00ff; }
            80%  { color: #00ff00; }
            100% { color: #ff0055; }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <!-- Pointing directly to your first uploaded PNG file -->
        <img id="slideshow" src="1.png" alt="Peak Background">
    </div>

    <div class="text-container">
        <h1>KOBHO IS PEAK</h1>
    </div>

    <script>
        // Pointing directly to all your uploaded PNG files
        const images = [
            "1.png",
            "2.png",
            "3.png",
            "4.png"
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById("slideshow");

        function changeImage() {
            currentIndex = (currentIndex + 1) % images.length;
            imgElement.src = images[currentIndex];
        }

        setInterval(changeImage, 3000);
    </script>

</body>
</html>
